name: Build & release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      # On pushes to main, commit any changed dist/ back to the branch.
      # This keeps dist/ in sync without requiring contributors to build locally.
      - name: Commit updated dist (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status dist --porcelain)" ]]; then
            git add dist/
            git commit -m "chore: rebuild dist [skip ci]"
            git push
          else
            echo "dist/ is already up to date"
          fi
